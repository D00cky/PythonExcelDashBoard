<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Upload</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #264653 0%, #2a9d8f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #1a1a1a;
        }
        .container {
            background: white;
            max-width: 640px;
            width: 100%;
            padding: 3rem 2.5rem;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        }
        h1 {
            font-size: 2.25rem;
            color: #264653;
            margin: 0 0 0.4rem;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: #666;
            margin: 0 0 2rem;
            font-size: 1.05rem;
        }
        .file-drop {
            display: block;
            border: 2px dashed #ccd6d4;
            padding: 2.5rem 1.5rem;
            text-align: center;
            border-radius: 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.1s;
            background: #f7fbfa;
            position: relative;
        }
        .file-drop:hover { border-color: #2a9d8f; background: #ecf6f4; }
        .file-drop.has-file { border-color: #2a9d8f; background: #e0f3ef; }
        .file-drop input[type="file"] {
            position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;
        }
        .file-icon { font-size: 3.5rem; line-height: 1; margin-bottom: 0.75rem; color: #2a9d8f; }
        .file-prompt { font-size: 1.15rem; color: #333; font-weight: 500; }
        .file-hint { color: #888; font-size: 0.9rem; margin-top: 0.4rem; }
        .file-name {
            margin-top: 0.6rem; padding: 0.4rem 0.8rem; background: #2a9d8f; color: white;
            border-radius: 6px; display: inline-block; font-size: 0.9rem; font-weight: 600;
            word-break: break-all; max-width: 100%;
        }
        button {
            display: block;
            width: 100%;
            margin-top: 1.75rem;
            padding: 1.1rem 2rem;
            background: linear-gradient(135deg, #2a9d8f 0%, #264653 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
            letter-spacing: 0.01em;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(38, 70, 83, 0.35); }
        button:active { transform: translateY(0); }
        .features {
            margin-top: 2.25rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eef1f0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            color: #555;
            font-size: 0.88rem;
        }
        @media (max-width: 480px) { .features { grid-template-columns: 1fr; } }
        .feature { text-align: center; padding: 0.5rem; }
        .feature .icon { font-size: 1.6rem; display: block; margin-bottom: 0.3rem; }
        .feature .label { line-height: 1.3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard</h1>
        <p class="subtitle">Análise de Relatório Semanal — Polo Pimentas e demais Polos</p>

        <form method="post" action="/upload" enctype="multipart/form-data" id="upload-form">
            <label class="file-drop" for="file" id="file-drop">
                <div class="file-icon">📊</div>
                <div class="file-prompt" id="file-prompt">Clique para selecionar a planilha</div>
                <div class="file-hint">Apenas arquivos .xlsx (Excel)</div>
                <div class="file-name" id="file-name" style="display: none;"></div>
                <input id="file" type="file" name="file" accept=".xlsx" required>
            </label>
            <button type="submit">⚡ Gerar Dashboard Interativo</button>
        </form>

        <div class="features">
            <div class="feature">
                <span class="icon">📈</span>
                <div class="label">13 gráficos interativos</div>
            </div>
            <div class="feature">
                <span class="icon">👥</span>
                <div class="label">Análise por equipe e TSS</div>
            </div>
            <div class="feature">
                <span class="icon">⬇️</span>
                <div class="label">Export: md, xlsx, pdf, docx</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var fileInput = document.getElementById('file');
            var drop = document.getElementById('file-drop');
            var prompt = document.getElementById('file-prompt');
            var nameBox = document.getElementById('file-name');
            fileInput.addEventListener('change', function () {
                if (this.files && this.files[0]) {
                    prompt.textContent = 'Arquivo selecionado';
                    nameBox.textContent = this.files[0].name;
                    nameBox.style.display = 'inline-block';
                    drop.classList.add('has-file');
                }
            });
        })();
    </script>
</body>
</html>
